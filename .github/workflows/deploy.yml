name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.98.46.215
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/assistant
            git pull
            cd frontend
            npm install --prefer-offline
            npm run build
            systemctl restart assistant
            echo "Deploy complete"

      - name: Health check
        run: |
          echo "Waiting for service to come up..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mcgreeff-assistant.duckdns.org/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed after 10 attempts — service is not responding."
          exit 1

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Bad gateway after deploy (run ${context.runId})`,
              body: `The post-deploy health check failed — the app returned a non-200 response after 10 attempts (30 seconds).\n\n**Action run:** ${run_url}\n**Commit:** ${context.sha}\n\nThe systemd \`assistant\` service likely crashed on startup. SSH in and check:\n\`\`\`\nssh root@91.98.46.215\njournalctl -u assistant -n 50\nsystemctl status assistant\n\`\`\``,
            });
